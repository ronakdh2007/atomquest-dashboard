<!DOCTYPE html>
<html>
<head>
  <title>Employee Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

  <!-- TOP NAVBAR -->
  <nav class="bg-[#FDBD13] px-6 py-3 flex justify-between items-center shadow-sm">
  <div>
    <p class="text-xs font-semibold text-black/40 uppercase tracking-widest">Atomberg</p>
    <h1 class="text-lg font-bold text-black">Goal Portal — <span id="employeeName"></span></h1>
  </div>
  <a href="index.html" 
    class="text-xs font-semibold text-black/60 hover:text-black border border-black/20 px-3 py-1.5 rounded-lg transition">
    Logout
  </a>
  </nav>

  <div class="max-w-4xl mx-auto mt-8 px-4">

    <!-- TWO BUTTONS TO SWITCH BETWEEN VIEWS -->
    <div class="flex gap-3 mb-6">
      <button onclick="showSection('createGoal')" id="btn_createGoal"
        class="section-btn bg-[#FDBD13] text-black px-4 py-2 rounded-lg text-sm font-semibold">
        Create New Goal
      </button>
      <button onclick="showSection('myGoals')" id="btn_myGoals"
        class="section-btn bg-white border border-gray-200 text-gray-600 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-gray-50">
        My Goals
      </button>
      <button onclick="showSection('checkins')" id="btn_checkins"
        class="section-btn bg-white border border-gray-200 text-gray-600 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-gray-50">
        My Check-ins
      </button>
    </div>

    <!-- SECTION 1: CREATE GOAL FORM -->
    <div id="createGoal" class="bg-white p-6 rounded shadow">
      <h2 class="text-xl font-bold mb-4">Create New Goal</h2>

      <div class="flex flex-col gap-4">

        <div>
          <label class="font-semibold">Goal Title</label>
          <input id="goalTitle" type="text" placeholder="Enter goal title"
            class="w-full border p-2 rounded mt-1">
        </div>

        <div>
          <label class="font-semibold">Description</label>
          <textarea id="goalDesc" placeholder="Describe your goal"
            class="w-full border p-2 rounded mt-1 h-24"></textarea>
        </div>

        <div>
          <label class="font-semibold">Thrust Area</label>
          <select id="thrustArea" class="w-full border p-2 rounded mt-1">
            <option>Sales</option>
            <option>Operations</option>
            <option>Finance</option>
            <option>HR</option>
            <option>Technology</option>
          </select>
        </div>

        <div>
          <label class="font-semibold">Unit of Measurement (UoM)</label>
          <select id="uomType" class="w-full border p-2 rounded mt-1">
            <option value="min">Numeric (Higher is better)</option>
            <option value="max">Numeric (Lower is better)</option>
            <option value="timeline">Timeline</option>
            <option value="zero">Zero-based</option>
          </select>
        </div>

        <div>
          <label class="font-semibold">Target</label>
          <input id="goalTarget" type="text" placeholder="e.g. 100000 or 2024-12-31"
            class="w-full border p-2 rounded mt-1">
        </div>

        <div>
          <label class="font-semibold">Weightage (%)</label>
          <input id="goalWeightage" type="number" placeholder="e.g. 20"
            class="w-full border p-2 rounded mt-1">
        </div>

        <!-- ERROR MESSAGE (hidden by default) -->
        <p id="errorMsg" class="text-red-500 hidden"></p>

        <button onclick="addGoal()"
          class="bg-blue-500 text-white py-2 rounded hover:bg-blue-600 font-semibold">
          Add Goal
        </button>

      </div>
    </div>

    <!-- SECTION 2: MY GOALS LIST -->
    <div id="myGoals" class="bg-white p-6 rounded shadow hidden">
      <h2 class="text-xl font-bold mb-4">My Goals</h2>
      
      <!-- WEIGHTAGE TOTAL -->
      <p class="mb-4">Total Weightage: 
        <span id="totalWeightage" class="font-bold text-blue-600">0%</span>
        <span class="text-gray-400 text-sm"> (must equal 100% to submit)</span>
      </p>

      <!-- GOALS TABLE -->
      <table class="w-full border-collapse">
        <thead>
          <tr class="bg-gray-100">
            <th class="border p-2 text-left">Title</th>
            <th class="border p-2 text-left">Thrust Area</th>
            <th class="border p-2 text-left">UoM</th>
            <th class="border p-2 text-left">Target</th>
            <th class="border p-2 text-left">Weightage</th>
            <th class="border p-2 text-left">Status</th>
            <th class="border p-2 text-left">Action</th>
          </tr>
        </thead>
        <tbody id="goalsTableBody">
          <!-- Goals will appear here -->
        </tbody>
      </table>

      <button onclick="submitGoals()"
        class="mt-4 bg-green-500 text-white px-6 py-2 rounded hover:bg-green-600 font-semibold">
        Submit Goals for Approval
      </button>

      <p id="submitMsg" class="mt-2 text-green-600 hidden font-semibold">
        Goals submitted successfully!
      </p>
    </div>
    <!-- SECTION 3: EMPLOYEE CHECK-INS -->
    <div id="checkins" class="bg-white p-6 rounded shadow hidden">
      <h2 class="text-xl font-bold mb-4">My Quarterly Check-ins</h2>
      <p class="text-gray-500 text-sm mb-4">
        Log your actual achievement against each approved goal.
      </p>
      <div id="checkinGoalsList"></div>
    </div>

  </div>

  <script type="module">
  // Import supabase connection we set up
  import { supabase } from './JS/supabase.js'

  // Current logged in user — we'll get this from localStorage
  // For now we'll hardcode John Doe for testing
  let currentUser = null
  let goals = []

  // When page loads, get the current user from database
  async function init() {
    // Get user from localStorage instead of hardcoding
    let stored = localStorage.getItem('currentUser')

    if (!stored) {
      // If no user logged in, send back to login
      window.location.href = 'index.html'
      return
    }

    currentUser = JSON.parse(stored)
    document.getElementById('employeeName').innerText = currentUser.name

    // If wrong role somehow got here, redirect
    if (currentUser.role !== 'employee') {
      window.location.href = 'index.html'
      return
    }

    loadGoals()
  }

  // Load goals from database
  async function loadGoals() {
    let { data, error } = await supabase
      .from('goals')
      .select('*')
      .eq('employee_id', currentUser.id)

    if (error) {
      alert('Error loading goals: ' + error.message)
      return
    }

    goals = data
    renderGoals()
  }

  // Make functions available to HTML buttons
  window.showSection = function(sectionName) {
    document.getElementById('createGoal').classList.add('hidden')
    document.getElementById('myGoals').classList.add('hidden')
    document.getElementById('checkins').classList.add('hidden')

    document.getElementById(sectionName).classList.remove('hidden')

    // Highlight active button
    document.querySelectorAll('.section-btn').forEach(btn => {
      btn.className = 'section-btn bg-white border border-gray-200 text-gray-600 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-gray-50'
    })
    document.getElementById('btn_' + sectionName).className = 
      'section-btn bg-[#FDBD13] text-black px-4 py-2 rounded-lg text-sm font-semibold'

    if (sectionName === 'myGoals') renderGoals()
    if (sectionName === 'checkins') loadCheckins()
  }

  window.addGoal = async function() {
    let title      = document.getElementById('goalTitle').value
    let desc       = document.getElementById('goalDesc').value
    let thrustArea = document.getElementById('thrustArea').value
    let uomType    = document.getElementById('uomType').value
    let target     = document.getElementById('goalTarget').value
    let weightage  = parseInt(document.getElementById('goalWeightage').value)

    // VALIDATION
    if (!title || !target || !weightage) {
      showError('Please fill in all fields.')
      return
    }
    if (weightage < 10) {
      showError('Minimum weightage per goal is 10%.')
      return
    }
    if (goals.length >= 8) {
      showError('Maximum 8 goals allowed.')
      return
    }

    let currentTotal = goals.reduce((sum, g) => sum + g.weightage, 0)
    if (currentTotal + weightage > 100) {
      showError('Total weightage cannot exceed 100%. You have ' + (100 - currentTotal) + '% remaining.')
      return
    }

    document.getElementById('errorMsg').classList.add('hidden')

    // SAVE TO SUPABASE instead of just the array
    let { data, error } = await supabase
      .from('goals')
      .insert({
        employee_id: currentUser.id,
        title:       title,
        description: desc,
        thrust_area: thrustArea,
        uom_type:    uomType,
        target:      target,
        weightage:   weightage,
        status:      'draft'
      })
      .select()
      .single()

    if (error) {
      showError('Error saving goal: ' + error.message)
      return
    }

    // Add to local array and clear form
    goals.push(data)

    document.getElementById('goalTitle').value = ''
    document.getElementById('goalDesc').value = ''
    document.getElementById('goalTarget').value = ''
    document.getElementById('goalWeightage').value = ''

    alert('Goal saved! Add more or go to My Goals to submit.')
  }

  window.deleteGoal = async function(goalId) {
    let { error } = await supabase
      .from('goals')
      .delete()
      .eq('id', goalId)

    if (error) {
      alert('Error deleting goal: ' + error.message)
      return
    }

    // Remove from local array
    goals = goals.filter(g => g.id !== goalId)
    renderGoals()
  }

  window.submitGoals = async function() {
    let total = goals.reduce((sum, g) => sum + g.weightage, 0)

    if (goals.length === 0) {
      alert('Add at least one goal first.')
      return
    }
    if (total !== 100) {
      alert('Total weightage must equal 100%. Currently at ' + total + '%.')
      return
    }

    // Update all goals status to submitted in database
    let { error } = await supabase
      .from('goals')
      .update({ status: 'submitted' })
      .eq('employee_id', currentUser.id)
      .in('status', ['draft', 'rejected'])

    if (error) {
      alert('Error submitting goals: ' + error.message)
      return
    }

    // Update local array
    goals = goals.map(g => ({ ...g, status: 'submitted' }))

    document.getElementById('submitMsg').classList.remove('hidden')
    renderGoals()
  }

  function renderGoals() {
    let tbody = document.getElementById('goalsTableBody')
    let totalWeightage = 0
    tbody.innerHTML = ''

    goals.forEach((goal) => {
      totalWeightage += goal.weightage

      // If goal is submitted or approved, don't show delete button
      let actionCell = goal.status === 'draft'
        ? `<button onclick="deleteGoal('${goal.id}')" 
             class="text-red-500 hover:underline text-sm">Remove</button>`
        : `<span class="text-gray-400 text-sm">Locked</span>`

      // Status badge color
      let badgeColor = {
        draft:     'bg-gray-100 text-gray-600',
        submitted: 'bg-yellow-100 text-yellow-700',
        approved:  'bg-green-100 text-green-700',
        rejected:  'bg-red-100 text-red-700'
      }[goal.status]

      tbody.innerHTML += `
        <tr>
          <td class="border p-2">${goal.title}</td>
          <td class="border p-2">${goal.thrust_area}</td>
          <td class="border p-2">${goal.uom_type}</td>
          <td class="border p-2">${goal.target}</td>
          <td class="border p-2">${goal.weightage}%</td>
          <td class="border p-2">
            <span class="px-2 py-1 rounded text-sm ${badgeColor}">
              ${goal.status}
            </span>
          </td>
          <td class="border p-2">${actionCell}</td>
        </tr>
      `
    })

    document.getElementById('totalWeightage').innerText = totalWeightage + '%'
  }

  function showError(message) {
    let errorMsg = document.getElementById('errorMsg')
    errorMsg.innerText = message
    errorMsg.classList.remove('hidden')
  }

  async function loadCheckins() {
    let { data: goals, error } = await supabase
      .from('goals')
      .select('*')
      .eq('employee_id', currentUser.id)
      .eq('status', 'approved')

    let container = document.getElementById('checkinGoalsList')

    if (error || !goals || goals.length === 0) {
      container.innerHTML = '<p class="text-gray-400">No approved goals yet. Goals must be approved by your manager before check-ins.</p>'
      return
    }

    // Get existing checkins for these goals
    let goalIds = goals.map(g => g.id)
    let { data: checkins } = await supabase
      .from('checkins')
      .select('*')
      .in('goal_id', goalIds)

    container.innerHTML = ''

    goals.forEach(goal => {
      let checkin = checkins ? checkins.find(c => c.goal_id === goal.id) : null

      container.innerHTML += `
        <div class="border rounded p-4 mb-4">
          <div class="flex justify-between items-center mb-3">
            <h3 class="font-bold">${goal.title}</h3>
            <span class="text-sm text-gray-500">Target: ${goal.target}</span>
          </div>

          <div class="flex flex-col gap-3">
            <div>
              <label class="font-semibold text-sm">Actual Achievement</label>
              <input id="actual_${goal.id}" type="text" 
                value="${checkin ? checkin.actual_achievement || '' : ''}"
                placeholder="Enter your actual achievement"
                class="w-full border p-2 rounded mt-1">
            </div>

            <div>
              <label class="font-semibold text-sm">Status</label>
              <select id="status_${goal.id}" class="w-full border p-2 rounded mt-1">
                <option value="not_started" ${!checkin || checkin.status === 'not_started' ? 'selected' : ''}>Not Started</option>
                <option value="on_track" ${checkin && checkin.status === 'on_track' ? 'selected' : ''}>On Track</option>
                <option value="completed" ${checkin && checkin.status === 'completed' ? 'selected' : ''}>Completed</option>
              </select>
            </div>

            <button onclick="saveActual('${goal.id}')"
              class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 text-sm font-semibold">
              Save Progress
            </button>

            <p id="saved_${goal.id}" class="text-green-600 text-sm font-semibold hidden">
              Progress saved!
            </p>
          </div>
        </div>
      `
    })
  }

  window.saveActual = async function(goalId) {
    let actual = document.getElementById('actual_' + goalId).value
    let status = document.getElementById('status_' + goalId).value

    if (!actual) {
      alert('Please enter your actual achievement.')
      return
    }

    let { error } = await supabase
      .from('checkins')
      .upsert({
        goal_id:            goalId,
        quarter:            'Q1',
        actual_achievement: actual,
        status:             status,
        updated_at:         new Date().toISOString()
      }, { onConflict: 'goal_id,quarter' })

    if (error) {
      alert('Error saving progress: ' + error.message)
      return
    }

    document.getElementById('saved_' + goalId).classList.remove('hidden')
  }

  // Start everything
  init()
</script>

</body>
</html>
