<!DOCTYPE html>
<html>
<head>
  <title>Manager Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

  <!-- TOP NAVBAR -->
  <nav class="bg-green-600 text-white px-6 py-4 flex justify-between items-center">
    <h1 class="text-xl font-bold">Goal Portal — <span id="managerName"></span></h1>
    <a href="index.html" class="text-sm underline">Logout</a>
  </nav>

  <div class="max-w-5xl mx-auto mt-8 px-4">

    <!-- SECTION SWITCH BUTTONS -->
    <div class="flex gap-4 mb-6">
      <button onclick="showSection('pendingApprovals')"
        class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">
        Pending Approvals
      </button>
      <button onclick="showSection('teamGoals')"
        class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">
        Team Goals
      </button>
      <button onclick="showSection('checkins')"
        class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">
        Quarterly Check-ins
      </button>
    </div>

    <!-- SECTION 1: PENDING APPROVALS -->
    <div id="pendingApprovals" class="bg-white p-6 rounded shadow">
      <h2 class="text-xl font-bold mb-4">Pending Approvals</h2>

      <!-- We'll loop through submitted goal sheets here -->
      <div id="pendingList"></div>
    </div>

    <!-- SECTION 2: TEAM GOALS (after approval, locked view) -->
    <div id="teamGoals" class="bg-white p-6 rounded shadow hidden">
      <h2 class="text-xl font-bold mb-4">Team Goals</h2>

      <table class="w-full border-collapse">
        <thead>
          <tr class="bg-gray-100">
            <th class="border p-2 text-left">Employee</th>
            <th class="border p-2 text-left">Goal</th>
            <th class="border p-2 text-left">Target</th>
            <th class="border p-2 text-left">Weightage</th>
            <th class="border p-2 text-left">Status</th>
          </tr>
        </thead>
        <tbody id="teamGoalsBody"></tbody>
      </table>
    </div>

    <!-- SECTION 3: QUARTERLY CHECK-INS -->
    <div id="checkins" class="bg-white p-6 rounded shadow hidden">
      <h2 class="text-xl font-bold mb-4">Quarterly Check-ins</h2>
      <p class="text-gray-500 mb-4 text-sm">
        Review each team member's progress and add your check-in comment.
      </p>

      <!-- EMPLOYEE CHECK-IN CARD -->
      <div id="checkinsList"></div>

    </div>
  </div>

  <script type="module">
  import { supabase } from './JS/supabase.js'

  let currentUser = null

  async function init() {
    let stored = localStorage.getItem('currentUser')

    if (!stored) {
      window.location.href = 'index.html'
      return
    }

    currentUser = JSON.parse(stored)
    document.getElementById('managerName').innerText = currentUser.name

    if (currentUser.role !== 'manager') {
      window.location.href = 'index.html'
      return
    }

    loadPendingGoals()
  }

  // Load all submitted goals for employees under this manager
  async function loadPendingGoals() {
    // First get all employees under this manager
    let { data: employees, error: empError } = await supabase
      .from('users')
      .select('*')
      .eq('manager_id', currentUser.id)

    if (empError || !employees.length) {
      document.getElementById('pendingList').innerHTML = 
        '<p class="text-gray-400">No employees found.</p>'
      return
    }

    // Get all submitted goals for these employees
    let employeeIds = employees.map(e => e.id)

    let { data: goals, error: goalsError } = await supabase
      .from('goals')
      .select('*')
      .in('employee_id', employeeIds)
      .eq('status', 'submitted')

    if (goalsError) {
      alert('Error loading goals: ' + goalsError.message)
      return
    }

    // Group goals by employee
    let pendingList = document.getElementById('pendingList')
    pendingList.innerHTML = ''

    if (goals.length === 0) {
      pendingList.innerHTML = '<p class="text-gray-400">No pending goals to approve.</p>'
      return
    }

    // For each employee, show their goals in a card
    employees.forEach(employee => {
      let employeeGoals = goals.filter(g => g.employee_id === employee.id)
      if (employeeGoals.length === 0) return

      let rows = employeeGoals.map(goal => `
        <tr>
          <td class="border p-2">${goal.title}</td>
          <td class="border p-2">${goal.thrust_area}</td>
          <td class="border p-2">${goal.uom_type}</td>
          <td class="border p-2" contenteditable="true" 
            data-goal-id="${goal.id}" data-field="target"
            class="focus:bg-yellow-50">${goal.target}</td>
          <td class="border p-2" contenteditable="true"
            data-goal-id="${goal.id}" data-field="weightage"
            class="focus:bg-yellow-50">${goal.weightage}%</td>
        </tr>
      `).join('')

      pendingList.innerHTML += `
        <div class="border rounded p-4 mb-4">
          <div class="flex justify-between items-center mb-3">
            <h3 class="font-bold text-lg">${employee.name}</h3>
            <span class="text-sm text-yellow-600 bg-yellow-100 px-2 py-1 rounded">
              Pending
            </span>
          </div>

          <table class="w-full border-collapse mb-3">
            <thead>
              <tr class="bg-gray-100">
                <th class="border p-2 text-left">Title</th>
                <th class="border p-2 text-left">Thrust Area</th>
                <th class="border p-2 text-left">UoM</th>
                <th class="border p-2 text-left">Target</th>
                <th class="border p-2 text-left">Weightage</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>

          <div class="mb-3">
            <label class="font-semibold text-sm">Comment (optional)</label>
            <textarea id="comment_${employee.id}" 
              placeholder="Add feedback or reason for rejection..."
              class="w-full border p-2 rounded mt-1 h-16 text-sm"></textarea>
          </div>

          <div class="flex gap-3">
            <button onclick="approveGoals('${employee.id}')"
              class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600 text-sm font-semibold">
              Approve Goals
            </button>
            <button onclick="returnGoals('${employee.id}')"
              class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600 text-sm font-semibold">
              Return for Rework
            </button>
          </div>

          <p id="status_${employee.id}" class="mt-2 font-semibold hidden"></p>
        </div>
      `
    })
  }

  // Load approved goals for team view
  async function loadTeamGoals() {
    let { data: employees } = await supabase
      .from('users')
      .select('*')
      .eq('manager_id', currentUser.id)

    if (!employees || employees.length === 0) {
      document.getElementById('teamGoalsBody').innerHTML = 
        '<tr><td colspan="5" class="border p-2 text-gray-400">No team goals found.</td></tr>'
      return
    }

    let employeeIds = employees.map(e => e.id)

    let { data: goals } = await supabase
      .from('goals')
      .select('*')
      .in('employee_id', employeeIds)
      .eq('status', 'approved')

    let tbody = document.getElementById('teamGoalsBody')
    tbody.innerHTML = ''

    if (!goals || goals.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="border p-2 text-gray-400">No approved goals yet.</td></tr>'
      return
    }

    goals.forEach(goal => {
      let employee = employees.find(e => e.id === goal.employee_id)
      tbody.innerHTML += `
        <tr>
          <td class="border p-2">${employee ? employee.name : 'Unknown'}</td>
          <td class="border p-2">${goal.title}</td>
          <td class="border p-2">${goal.target}</td>
          <td class="border p-2">${goal.weightage}%</td>
          <td class="border p-2">
            <span class="bg-green-100 text-green-700 px-2 py-1 rounded text-sm">
              Approved
            </span>
          </td>
        </tr>
      `
    })
  }

  // Load check-ins view
  async function loadCheckins() {
    let { data: employees } = await supabase
      .from('users')
      .select('*')
      .eq('manager_id', currentUser.id)

    if (!employees || employees.length === 0) return

    let employeeIds = employees.map(e => e.id)

    let { data: goals } = await supabase
      .from('goals')
      .select('*')
      .in('employee_id', employeeIds)
      .eq('status', 'approved')

    if (!goals || goals.length === 0) {
      document.getElementById('checkinsList').innerHTML = 
        '<p class="text-gray-400">No approved goals to check in on yet.</p>'
      return
    }

    // Get checkins for these goals
    let goalIds = goals.map(g => g.id)
    let { data: checkins } = await supabase
      .from('checkins')
      .select('*')
      .in('goal_id', goalIds)

    let checkinsList = document.getElementById('checkinsList')
    checkinsList.innerHTML = ''

    employees.forEach(employee => {
      let empGoals = goals.filter(g => g.employee_id === employee.id)
      if (empGoals.length === 0) return

      let rows = empGoals.map(goal => {
        let checkin = checkins ? checkins.find(c => c.goal_id === goal.id) : null
        let actual = checkin ? checkin.actual_achievement : 'Not entered'
        let status = checkin ? checkin.status : 'not_started'
        let score = calculateScore(goal.uom_type, goal.target, checkin ? checkin.actual_achievement : null)

        let statusColor = {
          not_started: 'bg-gray-100 text-gray-600',
          on_track:    'bg-blue-100 text-blue-700',
          completed:   'bg-green-100 text-green-700'
        }[status]

        return `
          <tr>
            <td class="border p-2">${goal.title}</td>
            <td class="border p-2">${goal.target}</td>
            <td class="border p-2">${actual}</td>
            <td class="border p-2">
              <span class="px-2 py-1 rounded text-sm ${statusColor}">${status}</span>
            </td>
            <td class="border p-2 font-semibold">${score}</td>
          </tr>
        `
      }).join('')

      checkinsList.innerHTML += `
        <div class="border rounded p-4 mb-4">
          <h3 class="font-bold text-lg mb-3">${employee.name} — Q1 Check-in</h3>
          <table class="w-full border-collapse mb-3">
            <thead>
              <tr class="bg-gray-100">
                <th class="border p-2 text-left">Goal</th>
                <th class="border p-2 text-left">Target</th>
                <th class="border p-2 text-left">Actual</th>
                <th class="border p-2 text-left">Status</th>
                <th class="border p-2 text-left">Score</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>

          <div class="mb-3">
            <label class="font-semibold text-sm">Check-in Comment</label>
            <textarea id="checkin_${employee.id}"
              placeholder="Document your discussion..."
              class="w-full border p-2 rounded mt-1 h-16 text-sm"></textarea>
          </div>

          <button onclick="saveCheckin('${employee.id}')"
            class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 text-sm font-semibold">
            Save Check-in
          </button>
          <p id="checkin_status_${employee.id}" class="mt-2 text-green-600 font-semibold hidden">
            Check-in saved!
          </p>
        </div>
      `
    })
  }

  // Calculate progress score based on UoM type
  function calculateScore(uomType, target, actual) {
    if (!actual) return 'N/A'
    let t = parseFloat(target)
    let a = parseFloat(actual)
    if (isNaN(t) || isNaN(a)) return 'N/A'

    if (uomType === 'min')      return Math.round((a / t) * 100) + '%'
    if (uomType === 'max')      return Math.round((t / a) * 100) + '%'
    if (uomType === 'zero')     return a === 0 ? '100%' : '0%'
    if (uomType === 'timeline') return 'See date'
    return 'N/A'
  }

  window.approveGoals = async function(employeeId) {
    let { error } = await supabase
      .from('goals')
      .update({ status: 'approved', is_locked: true })
      .eq('employee_id', employeeId)
      .eq('status', 'submitted')

    if (error) {
      alert('Error approving goals: ' + error.message)
      return
    }

    let status = document.getElementById('status_' + employeeId)
    status.innerText = '✓ Goals approved and locked.'
    status.classList.remove('hidden')
    status.classList.add('text-green-600')
  }

  window.returnGoals = async function(employeeId) {
    let comment = document.getElementById('comment_' + employeeId).value
    if (!comment) {
      alert('Please add a comment explaining what needs to be reworked.')
      return
    }

    let { error } = await supabase
      .from('goals')
      .update({ status: 'rejected' })
      .eq('employee_id', employeeId)
      .eq('status', 'submitted')

    if (error) {
      alert('Error returning goals: ' + error.message)
      return
    }

    let status = document.getElementById('status_' + employeeId)
    status.innerText = '✗ Goals returned for rework.'
    status.classList.remove('hidden')
    status.classList.add('text-red-600')
  }

  window.saveCheckin = async function(employeeId) {
    let comment = document.getElementById('checkin_' + employeeId).value
    if (!comment) {
      alert('Please add a check-in comment before saving.')
      return
    }

    // Save comment to all goals of this employee as checkin
    let { data: goals } = await supabase
      .from('goals')
      .select('id')
      .eq('employee_id', employeeId)
      .eq('status', 'approved')

    if (goals) {
      for (let goal of goals) {
        await supabase.from('checkins').upsert({
          goal_id:         goal.id,
          quarter:         'Q1',
          manager_comment: comment
        }, { onConflict: 'goal_id,quarter' })
      }
    }

    document.getElementById('checkin_status_' + employeeId).classList.remove('hidden')
  }

  window.showSection = function(sectionName) {
    document.getElementById('pendingApprovals').classList.add('hidden')
    document.getElementById('teamGoals').classList.add('hidden')
    document.getElementById('checkins').classList.add('hidden')
    document.getElementById(sectionName).classList.remove('hidden')

    if (sectionName === 'teamGoals')  loadTeamGoals()
    if (sectionName === 'checkins')   loadCheckins()
  }

  init()
</script>

</body>
</html>
