<!DOCTYPE html>
<html>
<head>
  <title>Manager Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

  <!-- TOP NAVBAR -->
  <nav class="bg-[#FDBD13] px-6 py-3 flex justify-between items-center shadow-sm">
    <div>
      <p class="text-xs font-semibold text-black/40 uppercase tracking-widest">Atomberg</p>
      <h1 class="text-lg font-bold text-black">Goal Portal — <span id="managerName"></span></h1>
    </div>
    <a href="index.html" 
      class="text-xs font-semibold text-black/60 hover:text-black border border-black/20 px-3 py-1.5 rounded-lg transition">
      Logout
    </a>
  </nav>

  <div class="max-w-5xl mx-auto mt-8 px-4">

    <!-- SECTION SWITCH BUTTONS -->
    <div class="flex gap-3 mb-6">
      <button onclick="showSection('pendingApprovals')" id="btn_pendingApprovals"
        class="section-btn bg-[#FDBD13] text-black px-4 py-2 rounded-lg text-sm font-semibold">
        Pending Approvals
      </button>
      <button onclick="showSection('teamGoals')" id="btn_teamGoals"
        class="section-btn bg-white border border-gray-200 text-gray-600 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-gray-50">
        Team Goals
      </button>
      <button onclick="showSection('checkins')" id="btn_checkins"
        class="section-btn bg-white border border-gray-200 text-gray-600 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-gray-50">
        Quarterly Check-ins
      </button>
    </div>

    <!-- SECTION 1: PENDING APPROVALS -->
    <div id="pendingApprovals" class="bg-white p-6 rounded shadow">
      <h2 class="text-xl font-bold mb-4">Pending Approvals</h2>

      <!-- We'll loop through submitted goal sheets here -->
      <div id="pendingList"></div>
    </div>

    <!-- SECTION 2: TEAM GOALS (after approval, locked view) -->
    <div id="teamGoals" class="bg-white p-6 rounded shadow hidden">
      <h2 class="text-xl font-bold mb-4">Team Goals</h2>

      <table class="w-full border-collapse">
        <thead>
          <tr class="bg-gray-100">
            <th class="border p-2 text-left">Employee</th>
            <th class="border p-2 text-left">Goal</th>
            <th class="border p-2 text-left">Target</th>
            <th class="border p-2 text-left">Weightage</th>
            <th class="border p-2 text-left">Status</th>
          </tr>
        </thead>
        <tbody id="teamGoalsBody"></tbody>
      </table>
    </div>

    <!-- SECTION 3: QUARTERLY CHECK-INS -->
    <div id="checkins" class="bg-white p-6 rounded shadow hidden">
      <h2 class="text-xl font-bold mb-4">Quarterly Check-ins</h2>
      <p class="text-gray-500 mb-4 text-sm">
        Review each team member's progress and add your check-in comment.
      </p>

      <!-- EMPLOYEE CHECK-IN CARD -->
      <div id="checkinsList"></div>

    </div>
  </div>

  <script type="module" src="JS/manager.js"></script>

</body>
</html>
